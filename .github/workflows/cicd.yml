
name: Indian-history-app-ci_cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Compile-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Run Unit Tests
        run: mvn -B clean test

      - name: Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Package Application (Skip Tests)
        run: mvn -B package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  OWASP-Dependency-Check:
    runs-on: ubuntu-latest
    needs: Compile-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Indian-history-app'
          path: '.'
          format: 'HTML'
          args: --failOnCVSS 7

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/
          retention-days: 7

  Build-Push:
    runs-on: ubuntu-latest
    needs: OWASP-Dependency-Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: vars
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image via Docker Compose
        run: docker compose build

      - name: Tag image
        run: |
          docker tag indian-history-app ${{ secrets.DOCKER_USERNAME }}/Indian-history-app:latest
          docker tag indian-history-app ${{ secrets.DOCKER_USERNAME }}/Indian-history-app:${{ steps.vars.outputs.tag }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/Indian-history-app:${{ steps.vars.outputs.tag }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-report.txt'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/Indian-history-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/Indian-history-app:${{ steps.vars.outputs.tag }}
