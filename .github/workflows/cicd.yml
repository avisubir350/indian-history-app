name : Indian-history-app-ci_cd

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

# job-1.....Compile, Test & Package the Java Application......
  Compile-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for SonarQube blame data

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Run Unit Tests
        run: mvn -B clean test

  # This step uploads your unit test reports so you can inspect failures from the GitHub UI
      - name: Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always() # Always run this step even if 'Compile and Test' fails
        with:
          name: surefire-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Package Application (Skip Tests)
        run: mvn -B package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1
          
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}  # ← use step output
        with:
          project: "indian-history-app"
          path: "./"
          format: "HTML"
          out: "dependency-check-report"

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: dependency-check-report/
          retention-days: 7
