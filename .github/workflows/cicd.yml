
name: Indian-history-app-ci_cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Compile-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Run Unit Tests
        run: mvn -B clean test

      - name: Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Package Application (Skip Tests)
        run: mvn -B package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  OWASP-Dependency-Check:
    runs-on: ubuntu-latest
    needs: Compile-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'bharata-katha-app'
          path: '.'
          format: 'HTML'
          args: --failOnCVSS 7

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/
          retention-days: 7

  Build-Push:
    runs-on: ubuntu-latest
    needs: OWASP-Dependency-Check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: vars
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image via Docker Compose
        run: docker compose build

      - name: Tag image
        run: |
          docker tag bharata-katha-app ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:latest
          docker tag bharata-katha-app ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:${{ steps.vars.outputs.tag }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:${{ steps.vars.outputs.tag }}
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-report.txt'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 7

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:${{ steps.vars.outputs.tag }}

# ── Job 4: GitOps — Update config repo ────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: Build-Push
    if: github.event_name == 'push'
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: 'avisubir350/indian-history-config'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: 'indian-history-config'
          ref: 'main'

      - name: Update image tag across all manifests
        run: |
          cd indian-history-config

          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:${{ needs.build-and-push.outputs.image_tag }}|g" \
            namespace.yml \
            secret.yml \
            service.yml \
            statefulset.yml \
            deployment.yml \
            monitoring.yml \
            ingress.yml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add namespace.yml secret.yml service.yml statefulset.yml deployment.yml monitoring.yml ingress.yml

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
          else
            git commit -m "chore: update image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git push origin main
          fi
