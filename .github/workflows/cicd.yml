name: Indian-history-app-ci_cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
# ─────────────────────────────────────────────────────────────
# JOB 1 — Compile & Test
# ─────────────────────────────────────────────────────────────
  compile-test:
    name: Compile & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile and run unit tests
        run: mvn -B clean test

      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Package application (skip tests — already ran above)
        run: mvn -B package -DskipTests

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/*.war
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# JOB 2 — OWASP Dependency Check (Maven plugin — no Docker)
#
# Why Maven plugin instead of dependency-check/Dependency-Check_Action?
# The Docker-based action inherits JAVA_HOME from the runner but runs
# its own JRE inside the container — causes "JAVA_HOME not defined
# correctly" when the runner JDK version doesn't match the container.
# The Maven plugin runs in the same JVM that setup-java configured,
# so there is no version mismatch.
# ─────────────────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: compile-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Cache the NVD data between runs — saves ~5 min on repeat runs
      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency Check (Maven plugin)
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformat=HTML \
            -DoutputDirectory=target/dependency-check-report \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -DnvdApiDelay=6000
        # failBuildOnCVSS=9 → only fail on critical (score ≥ 9)
        # Raise to 7 once baseline is clean
        continue-on-error: true   # report but don't block the pipeline yet

      - name: Upload Dependency Check HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report/
          retention-days: 7
