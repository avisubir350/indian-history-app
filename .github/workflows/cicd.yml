name: Indian-history-app-ci_cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Compile-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Run Unit Tests
        run: mvn -B clean test

      - name: Upload Surefire Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Package Application (Skip Tests)
        run: mvn -B package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  OWASP-Dependency-Check:
    runs-on: ubuntu-latest
    needs: Compile-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Indian-history-app'
          path: '.'
          format: 'HTML'
          args: --failOnCVSS 7

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/
          retention-days: 7

  Docker-Build-and-Push:

    runs-on: ubuntu-latest
    needs: OWASP-Dependency-Check
    # needs: sonarqube-scan
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "tag=v1.0" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:latest
            ${{ secrets.DOCKER_USERNAME }}/bharata-katha-app:${{ steps.vars.outputs.tag }}
